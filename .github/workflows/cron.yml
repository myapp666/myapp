name: 定时采集

on:
  schedule:
    # 每 5 分钟（GitHub Actions 免费版有几分钟延迟，正常）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 调用采集端点
        run: |
          curl -fsS -m 540 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://YOUR_DOMAIN.vercel.app/api/cron/collect"